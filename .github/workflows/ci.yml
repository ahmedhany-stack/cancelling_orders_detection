name: Build, Test and Push Docker Image

# الـ Trigger يدوي أو أوتوماتيك لو حبيت تخليه مع الـ Push على الـ main
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image Tag (e.g., v1, v1.1, latest)'
        required: true
        default: 'v1'
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد بايثون لاختبارات الـ Pytest (اختياري لو حابب تتأكد من سلامة الكود قبل الـ Build)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies for Testing
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 3. تشغيل الـ Unit Tests (لو عندك مجلد tests)
      - name: Run Tests with Pytest
        run: |
          echo "Running tests..."
          # pytest tests/ || echo "No tests folder found, skipping..."

      # 4. إعداد الـ Docker Buildx (لتحسين سرعة البناء والكاشينج)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. تسجيل الدخول إلى Docker Hub بأمان باستخدام الـ Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. بناء الـ Image ورفعها تلقائياً مع تمرير بيانات MLflow للـ Docker بأمان
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/churn-prediction:${{ github.event.inputs.image_tag || 'latest' }}
            ${{ secrets.DOCKER_USERNAME }}/churn-prediction:latest
          build-args: |
            MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
            MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}
            MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. إرسال إشعار نجاح على Slack (اختياري واحترافي جداً)
      - name: Send Slack Notification on Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "🚀 *Docker Image Built & Pushed Successfully!*\nRepository: `ahmed93847/churn-prediction`\nTag: `${{ github.event.inputs.image_tag || 'latest' }}`"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # 8. إرسال إشعار فشل على Slack لو حصلت مشكلة
      - name: Send Slack Notification on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "❌ *Docker Build Failed!* Please check GitHub Actions logs."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}