model:
  name: XGBClassifier

  parameters:
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 7
    min_child_weight: 2
    subsample: 0.85
    colsample_bytree: 0.85
    gamma: 0.15
    reg_alpha: 0.2
    reg_lambda: 2
    random_state: 42
    n_jobs: -1

training:
  cv_folds: 5
  scoring: f1

save:
  save_model: true
  output_path: models/xgboost.pkl